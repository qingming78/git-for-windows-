<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    user-select: none;
    overflow: hidden;
  }
  .container { text-align: center; }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 8px 12px 8px;
  }
  .score-box {
    background: #0f3460;
    border-radius: 10px;
    padding: 8px 20px;
    color: #8899bb;
    font-size: 13px;
    font-weight: 500;
  }
  .score-box span {
    color: #e94560;
    font-size: 22px;
    font-weight: 700;
    margin-left: 6px;
  }
  .high-score {
    color: #ffd700;
    font-size: 13px;
    background: #0f3460;
    border-radius: 10px;
    padding: 8px 16px;
  }
  .high-score span {
    font-size: 18px;
    font-weight: 700;
    margin-left: 4px;
  }
  canvas {
    background: #0f3460;
    border-radius: 12px;
    display: block;
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
  }
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(15,52,96,.85);
    border-radius: 12px;
    opacity: 0;
    transition: opacity .25s;
    pointer-events: none;
  }
  .overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .overlay h2 {
    color: #fff;
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .overlay p {
    color: #8899bb;
    font-size: 15px;
    margin-bottom: 24px;
  }
  .overlay .final-score {
    color: #e94560;
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .overlay .btn {
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px 40px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: .12s;
    margin-top: 8px;
  }
  .overlay .btn:hover { background: #ff5a75; transform: translateY(-1px); }
  .controls-hint {
    color: #445577;
    font-size: 12px;
    margin-top: 10px;
    letter-spacing: .5px;
  }
  .canvas-wrap {
    position: relative;
    display: inline-block;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="score-box">得分 <span id="score">0</span></div>
    <div class="high-score">🏆 <span id="highScore">0</span></div>
  </div>
  <div class="canvas-wrap">
    <canvas id="game" width="480" height="480"></canvas>
    <div class="overlay show" id="overlay">
      <h2>🐍 贪吃蛇</h2>
      <p>按方向键或 WASD 控制</p>
      <button class="btn" id="startBtn">开始游戏</button>
    </div>
  </div>
  <div class="controls-hint">↑ ↓ ← → 或 W A S D 控制 · 空格暂停</div>
</div>
<script src="game.js"></script>
</body>
</html>
